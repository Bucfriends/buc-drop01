    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000000; color: #FFFFFF; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; border: 1px solid #1C1C1E; }
        
        /* Topo da marca - Mais imponente e limpo */
        header { text-align: center; padding: 25px; border-bottom: 1px solid #1C1C1E; font-size: 28px; font-weight: bold; letter-spacing: 6px; text-transform: uppercase; }
        
        /* Área da foto e botão */
        .media-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #050505; padding: 20px; }
        
        /* Área de captura */
        .capture-area { padding: 40px 20px; text-align: center; background-color: #000000; border-top: 1px solid #1C1C1E; }
        
        /* Frase Opção 1 */
        .capture-area h1 { font-size: 11px; font-weight: normal; letter-spacing: 2px; line-height: 1.8; margin-bottom: 25px; color: #AAAAAA; text-transform: uppercase; }

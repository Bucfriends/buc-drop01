<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUC</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Special Elite', cursive; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { padding: 40px; text-align: center; border-bottom: 1px solid #333; }
        .brand-title { font-size: 32px; letter-spacing: 15px; text-transform: uppercase; font-weight: normal; }
        
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        #btn-reveal { background: none; border: 1px solid #fff; color: #fff; padding: 20px 40px; cursor: pointer; font-size: 16px; letter-spacing: 5px; transition: 0.3s; font-family: 'Special Elite', cursive; text-transform: uppercase; }
        #btn-reveal:hover { background: #fff; color: #000; }
        
        #content { display: none; text-align: center; }
        video { width: 100%; max-width: 400px; margin-bottom: 20px; border: 1px solid #333; }
        
        .manifesto { font-size: 12px; color: #aaa; max-width: 350px; line-height: 1.8; text-transform: uppercase; margin-bottom: 40px; letter-spacing: 1px; }
        
        .footer { padding: 40px; border-top: 1px solid #333; text-align: center; }
        input { background: none; border: 1px solid #333; color: #fff; padding: 15px; width: 100%; max-width: 300px; text-align: center; margin-bottom: 10px; font-family: 'Special Elite', cursive; }
        
        /* BOTÃO CORRIGIDO: Fundo branco, letra preta */
        button[type="submit"] { background: #fff; color: #000; border: none; padding: 15px 30px; cursor: pointer; text-transform: uppercase; font-weight: bold; font-family: 'Special Elite', cursive; }
    </style>
</head>
<body>
    <header>
        <h1 class="brand-title">“BUC”</h1>
    </header>
    
    <div class="main">
        <button id="btn-reveal" onclick="reveal()">[ ABRIR ]</button>
        <div id="content">
            <video id="vid" src="IMG_9221.mov" playsinline controls></video>
            
            <p class="manifesto">EXISTE UMA ESTRUTURA POR TRÁS DE CADA MUDANÇA. O “NewEu” NÃO É SOBRE O QUE VOCÊ DEIXOU PARA TRÁS, MAS SOBRE O QUE VOCÊ DECIDIU SE TORNAR A PARTIR DO QUE ANTES ERA INVISÍVEL AO SEU OLHAR. “BUC”</p>
        </div>
    </div>

    <div class="footer">
        <form action="https://formspree.io/f/mvzjygjl" method="POST">
            <input type="email" name="email" placeholder="SEU E-MAIL" required>
            <br>
            <button type="submit">SOLICITAR ACESSO</button>
        </form>
    </div>

    <script>
        function reveal() {
            document.getElementById('btn-reveal').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            document.getElementById('vid').play();
        }
    </script>
</body>
</html>

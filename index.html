<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUC | DROP 01</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000000; color: #FFFFFF; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; border: 1px solid #1C1C1E; }
        
        /* Topo da marca */
        header { text-align: center; padding: 25px; border-bottom: 1px solid #1C1C1E; font-size: 28px; font-weight: bold; letter-spacing: 6px; text-transform: uppercase; }
        
        /* Área do vídeo e botão */
        .media-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #050505; padding: 20px; }
        
        /* Área de captura */
        .capture-area { padding: 40px 20px; text-align: center; background-color: #000000; border-top: 1px solid #1C1C1E; }
        
        /* Frase Opção 1 */
        .capture-area h1 { font-size: 11px; font-weight: normal; letter-spacing: 2px; line-height: 1.8; margin-bottom: 25px; color: #AAAAAA; text-transform: uppercase; }
        
        /* Inputs e Botões Formulario */
        input[type="email"] { background-color: transparent; border: 1px solid #333; color: #FFF; padding: 15px; width: 100%; max-width: 400px; text-align: center; margin-bottom: 10px; outline: none; letter-spacing: 1px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        input[type="email"]:focus { border-color: #FFF; }
        
        .btn-submit { background-color: #FFFFFF; color: #000000; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; max-width: 400px; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .btn-submit:hover { background-color: #CCCCCC; }
        
        /* Botão Reveal Yugen */
        #revealBtn { background-color: transparent; border: 1px solid #FFF; color: #FFF; padding: 15px 30px; font-size: 12px; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        #revealBtn:hover { background-color: #FFF; color: #000; }
        
        /* Vídeo do Produto (escondido no inicio) */
        #productVideo { display: none; width: 100%; max-width: 350px; border: 1px solid #333; outline: none; }
    </style>
</head>
<body>
    
    <header>BUC</header>
    
    <div class="media-container">
        <!-- Botão interativo -->
        <button id="revealBtn" onclick="revealProduct()">[ REVELAR ESTRUTURA ]</button>
        
        <!-- Local do VÍDEO COM O NOME EXATO DO SEU IPHONE -->
        <video id="productVideo" src="IMG_9221.mov" playsinline controls></video>
    </div>

    <div class="capture-area">
        <h1>FORMA, FUNÇÃO E FUNDAMENTO.<br>A NOSSA PRIMEIRA ESTRUTURA.</h1>
        
        <form action="https://formspree.io/f/mqkopwlo" method="POST">
            <input type="email" name="email" placeholder="SEU E-MAIL" required>
            <button type="submit" class="btn-submit">FAZER PARTE</button>
        </form>
    </div>

    <script>
        function revealProduct() {
            var video = document.getElementById('productVideo');
            document.getElementById('revealBtn').style.display = 'none';
            video.style.display = 'block';
            video.play();
        }
    </script>

</body>
</html>
